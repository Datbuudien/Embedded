[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; --- 1. CẤU HÌNH PHẦN CỨNG VÀ ÉP XUẤT NATIVE USB ---
board_upload.flash_size = 16MB

; --- 2. DANH SÁCH THƯ VIỆN BẮT BUỘC CỦA ĐỒ ÁN ---
lib_deps =
    adafruit/RTClib @ ^2.1.4
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    bblanchon/ArduinoJson @ ^7.4.3
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.3.11

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

    ; --- CẤU HÌNH TFT_eSPI (CHUẨN DATASHEET) ---
    -D USE_HSPI_PORT=1
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=11
    -D TFT_SCLK=12
    -D TFT_MISO=13
    -D TFT_CS=10
    -D TFT_DC=46
    -D TFT_RST=-1
    -D TFT_BL=45           ; <-- QUAN TRỌNG: Chân đèn nền
    -D TFT_BACKLIGHT_ON=1  ; <-- Ép bật đèn nền
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; --- CẤU HÌNH LVGL ---
    -D LV_CONF_INCLUDE_SIMPLE
    -I include